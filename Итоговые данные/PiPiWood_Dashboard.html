<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PiPiWood: Бизнес Дашборд</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        .header h1 {
            font-size: 3rem;
            color: #2c3e50;
            margin: 0;
        }
        .header p {
            font-size: 1.2rem;
            color: #7f8c8d;
        }
        
        .kpi-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }
        .kpi-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            flex: 1;
            min-width: 250px;
            max-width: 300px;
            transition: transform 0.3s ease;
        }
        .kpi-card:hover {
            transform: translateY(-5px);
        }
        .kpi-card h3 {
            margin: 0;
            font-size: 1.2rem;
            color: #95a5a6;
            text-transform: uppercase;
        }
        .kpi-card .number {
            font-size: 2.5rem;
            font-weight: 900;
            color: #3498db;
            margin: 10px 0 0;
        }
        .kpi-card.green .number { color: #2ecc71; }
        .kpi-card.purple .number { color: #9b59b6; }

        .charts-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .chart-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }
        .chart-card h2 {
            text-align: center;
            color: #2c3e50;
            font-size: 1.5rem;
            margin-bottom: 20px;
        }
        canvas {
            max-width: 100%;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>📊 Сводка PiPiWood</h1>
        <p>Наглядная картина бизнеса — просто и понятно даже ребенку!</p>
    </div>

    <div class="kpi-container">
        <div class="kpi-card">
            <h3>Заказов всего</h3>
            <div class="number">6146</div>
        </div>
        <div class="kpi-card purple">
            <h3>Уникальных клиентов</h3>
            <div class="number">2200</div>
        </div>
        <div class="kpi-card green">
            <h3>Восстановленная Выручка</h3>
            <div class="number">16,876,436 ₽</div>
        </div>
    </div>

    <div class="charts-container">
        <div class="chart-card">
            <h2>🌍 Где живут наши клиенты? (Города)</h2>
            <canvas id="cityChart"></canvas>
        </div>
        
        <div class="chart-card">
            <h2>❤️ Насколько нас любят? (Лояльность)</h2>
            <canvas id="loyaltyChart"></canvas>
        </div>

        <div class="chart-card">
            <h2>📦 Что у нас покупают? (Товары)</h2>
            <canvas id="productChart"></canvas>
        </div>
    </div>

    <script>
        // Настройки для графиков (цвета пастельные и яркие)
        const commonOptions = {
            responsive: true,
            plugins: {
                legend: { position: 'bottom' }
            }
        };

        // 1. График Городов (Bar)
        new Chart(document.getElementById('cityChart'), {
            type: 'bar',
            data: {
                labels: ["\u041c\u043e\u0441\u043a\u0432\u0430", "\u041f\u043e\u0434\u043e\u043b\u044c\u0441\u043a", "\u0425\u0438\u043c\u043a\u0438", "\u041b\u044e\u0431\u0435\u0440\u0446\u044b", "\u0411\u0430\u043b\u0430\u0448\u0438\u0445\u0430", "\u041a\u0440\u0430\u0441\u043d\u043e\u0433\u043e\u0440\u0441\u043a", "\u041c\u044b\u0442\u0438\u0449\u0438", "\u0414\u043e\u043c\u043e\u0434\u0435\u0434\u043e\u0432\u043e", "\u041e\u0434\u0438\u043d\u0446\u043e\u0432\u043e", "\u0417\u0435\u043b\u0435\u043d\u043e\u0433\u0440\u0430\u0434"],
                datasets: [{
                    label: 'Количество заказов',
                    data: [5662, 114, 72, 69, 66, 46, 45, 33, 22, 10],
                    backgroundColor: '#3498db',
                    borderRadius: 10
                }]
            },
            options: {
                ...commonOptions,
                plugins: { legend: { display: false } }
            }
        });

        // 2. График Лояльности (Doughnut)
        new Chart(document.getElementById('loyaltyChart'), {
            type: 'doughnut',
            data: {
                labels: ["1 \u0437\u0430\u043a\u0430\u0437 (\u041d\u043e\u0432\u0438\u0447\u043a\u0438)", "2-5 \u0437\u0430\u043a\u0430\u0437\u043e\u0432 (\u041f\u043e\u0441\u0442\u043e\u044f\u043d\u043d\u044b\u0435)", "6+ \u0437\u0430\u043a\u0430\u0437\u043e\u0432 (VIP)"],
                datasets: [{
                    data: [1304, 663, 233],
                    backgroundColor: ['#f1c40f', '#2ecc71', '#e74c3c'],
                    hoverOffset: 10
                }]
            },
            options: commonOptions
        });

        // 3. График Товаров (Pie)
        new Chart(document.getElementById('productChart'), {
            type: 'pie',
            data: {
                labels: ["\u0422\u043e\u0444\u0443", "\u0421\u0438\u043b\u0438\u043a\u0430\u0433\u0435\u043b\u044c", "\u0414\u0440\u0435\u0432\u0435\u0441\u043d\u044b\u0439", "\u0411\u0435\u043d\u0442\u043e\u043d\u0438\u0442"],
                datasets: [{
                    data: [566, 1211, 696, 275],
                    backgroundColor: ['#9b59b6', '#3498db', '#e67e22', '#95a5a6'],
                    hoverOffset: 10
                }]
            },
            options: commonOptions
        });
    </script>
</body>
</html>
